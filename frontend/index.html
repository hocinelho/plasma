<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plasma — Voice Assistant</title>
    <style>
        :root {
            --bg: #0a0e1a;
            --panel: #141b2e;
            --text: #e6edf7;
            --muted: #8a94a7;
            --accent: #4a9eff;
            --accent-hot: #ff4a5e;
            --ok: #6fd48a;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px;
        }
        h1 {
            font-weight: 300;
            letter-spacing: 0.2em;
            margin: 0 0 4px 0;
            font-size: 42px;
        }
        .subtitle {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 32px;
        }
        #status {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--muted);
            transition: background 0.2s;
        }
        #status.ok .dot { background: var(--ok); }
        #status.recording .dot { background: var(--accent-hot); animation: pulse 1s infinite; }
        #status.processing .dot { background: var(--accent); animation: pulse 0.5s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        #talk-btn {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            background: radial-gradient(circle, #1f2b4a, var(--panel));
            color: var(--text);
            font-size: 18px;
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
            margin-bottom: 16px;
        }
        #talk-btn:hover { border-color: var(--accent-hot); }
        #talk-btn.recording {
            background: radial-gradient(circle, #4a1f2b, #2b1421);
            border-color: var(--accent-hot);
            box-shadow: 0 0 40px rgba(255, 74, 94, 0.5);
            transform: scale(1.05);
        }
        .hint {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 32px;
        }
        #log {
            width: 100%;
            max-width: 700px;
            background: var(--panel);
            border-radius: 12px;
            padding: 16px;
            height: 400px;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.5;
        }
        .turn {
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid #232b42;
        }
        .turn:last-child { border-bottom: none; }
        .turn .role {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--muted);
            margin-bottom: 4px;
        }
        .turn.user .role { color: var(--accent); }
        .turn.assistant .role { color: var(--ok); }
        .turn.error .role { color: var(--accent-hot); }
        .turn.error .content { color: var(--accent-hot); }
        .turn .content { white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>PLASMA</h1>
    <div class="subtitle">local-first voice assistant</div>

    <div id="status"><span class="dot"></span><span class="text">idle</span></div>

    <button id="talk-btn">Hold to talk</button>
    <div class="hint">or press and hold <b>SPACE</b></div>

    <div id="log"></div>

<script>
const btn = document.getElementById('talk-btn');
const statusEl = document.getElementById('status');
const statusText = statusEl.querySelector('.text');
const log = document.getElementById('log');

let mediaRecorder = null;
let chunks = [];
let isRecording = false;
const SESSION_ID = 'web-' + Math.random().toString(36).slice(2, 10);

function setStatus(mode, text) {
    statusEl.className = mode;
    statusText.textContent = text;
}

function addTurn(role, content) {
    const div = document.createElement('div');
    div.className = 'turn ' + role;
    div.innerHTML = `<div class="role">${role}</div><div class="content"></div>`;
    div.querySelector('.content').textContent = content;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
}

async function initMic() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
        mediaRecorder.ondataavailable = e => {
            if (e.data.size > 0) chunks.push(e.data);
        };
        mediaRecorder.onstop = async () => {
            const blob = new Blob(chunks, { type: 'audio/webm' });
            chunks = [];
            await sendAudio(blob);
        };
        setStatus('ok', 'ready');
        return true;
    } catch (err) {
        setStatus('', 'mic permission denied');
        addTurn('error', 'Microphone access denied: ' + err.message);
        return false;
    }
}

async function sendAudio(blob) {
    setStatus('processing', 'transcribing + thinking…');
    const form = new FormData();
    form.append('audio', blob, 'speech.webm');
    form.append('session_id', SESSION_ID);
    try {
        const r = await fetch('/voice/chat', { method: 'POST', body: form });
        const data = await r.json();
        if (data.transcript) addTurn('user', data.transcript);
        if (data.reply) addTurn('assistant', data.reply);
        if (data.error && !data.transcript) addTurn('error', data.error);
        setStatus('ok', 'ready');
    } catch (err) {
        setStatus('', 'error');
        addTurn('error', 'Request failed: ' + err.message);
    }
}

function startRecording() {
    if (isRecording || !mediaRecorder) return;
    if (mediaRecorder.state === 'recording') return;
    isRecording = true;
    btn.classList.add('recording');
    btn.textContent = 'Listening…';
    setStatus('recording', 'recording');
    chunks = [];
    mediaRecorder.start();
}

function stopRecording() {
    if (!isRecording || !mediaRecorder) return;
    isRecording = false;
    btn.classList.remove('recording');
    btn.textContent = 'Hold to talk';
    if (mediaRecorder.state === 'recording') mediaRecorder.stop();
}

// Button press & hold
btn.addEventListener('mousedown', startRecording);
btn.addEventListener('mouseup', stopRecording);
btn.addEventListener('mouseleave', stopRecording);
btn.addEventListener('touchstart', e => { e.preventDefault(); startRecording(); });
btn.addEventListener('touchend', e => { e.preventDefault(); stopRecording(); });

// SPACE bar press & hold
window.addEventListener('keydown', e => {
    if (e.code === 'Space' && !e.repeat && document.activeElement.tagName !== 'INPUT') {
        e.preventDefault();
        startRecording();
    }
});
window.addEventListener('keyup', e => {
    if (e.code === 'Space') {
        e.preventDefault();
        stopRecording();
    }
});

initMic();
</script>
</body>
